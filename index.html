```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: PRIMAL | Tactical Digital Twin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: 'Space Grotesk', sans-serif; }
        .tactical-border { border: 1px solid #404040; }
        .viewer-box { width: 100%; height: 280px; background: #000; position: relative; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-8 flex justify-between items-end border-b border-gray-700 pb-4">
        <div>
            <h1 class="text-5xl font-bold uppercase tracking-widest text-white">Project: PRIMAL</h1>
            <p class="text-sm uppercase tracking-[0.3em] text-gray-500">The Fight for Eden</p>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Asset Viewers Grid -->
        <div class="md:col-span-3 grid grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="v1" class="viewer-box tactical-border" data-file="KORU.glb"></div>
            <div id="v2" class="viewer-box tactical-border" data-file="ZYXAR.glb"></div>
            <div id="v3" class="viewer-box tactical-border" data-file="NYAR.glb"></div>
            <div id="v4" class="viewer-box tactical-border" data-file="ROGAR.glb"></div>
            <div id="v5" class="viewer-box tactical-border" data-file="KORU-HUD.glb"></div>
            <div id="v6" class="viewer-box tactical-border" data-file="ZYXAR-HUD.glb"></div>
        </div>

        <!-- Media/Story Section -->
        <div class="md:col-span-2 space-y-6">
            <div class="glass p-6 tactical-border">
                <h3 class="text-xs uppercase mb-4 text-gray-400">Cinematic Feed</h3>
                <iframe class="w-full h-80" src="https://www.youtube.com/embed/gbhHcqFjo8k" allowfullscreen></iframe>
            </div>
            <div class="glass p-6 tactical-border">
                <h3 class="text-xs uppercase mb-4 text-gray-400">Storyline Synopsis</h3>
                <p id="storyDisplay" class="text-sm italic leading-relaxed text-gray-300"></p>
            </div>
        </div>

        <!-- Audio/Data Section -->
        <div class="glass p-6 tactical-border">
            <h3 class="text-xs uppercase mb-4 text-gray-400">Audio Orchestration</h3>
            <audio controls class="w-full mb-6 filter invert sepia" src="assets/EDENDSNTRK.mp3"></audio>
            <div class="text-[10px] text-gray-600 uppercase font-mono">
                System Status: Active<br>Lighting: PBR Studio Standard<br>Path: /assets/
            </div>
        </div>
    </div>

    <script>
        const story = "Earth is a memory. The Zytherons farm human data ghosts. Koru and his squad must choose between restoring a dead humanity or forging a new primal evolution.";
        document.getElementById('storyDisplay').innerText = story;

        function initViewer(id) {
            const container = document.getElementById(id);
            const fileName = container.getAttribute('data-file');
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(40, container.clientWidth/280, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, 280);
            container.appendChild(renderer.domElement);

            // Studio Lighting Rig
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(5, 5, 5);
            scene.add(keyLight);

            const loader = new THREE.GLTFLoader();
            loader.load(`assets/${fileName}`, (gltf) => {
                scene.add(gltf.scene);
            }, undefined, () => {
                // Placeholder geometry if load fails
                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshBasicMaterial({ color: 0x333333 });
                scene.add(new THREE.Mesh(geo, mat));
            });

            camera.position.z = 4;
            new THREE.OrbitControls(camera, renderer.domElement);
            function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
            animate();
        }

        ['v1', 'v2', 'v3', 'v4', 'v5', 'v6'].forEach(initViewer);
    </script>
</body>
</html>
